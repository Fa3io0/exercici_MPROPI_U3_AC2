<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <form id="loginForm">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <small id="passwordHint">Password must be at least 8 characters and include uppercase, lowercase, number, and special character.</small>

    <button type="submit">Entrar</button>

    <p id="message"></p>
  </form>

  <script type="module" src="app.js"></script>
</body>
</html>
